{% include base_path %}

<!-- start custom head snippets -->

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#faf9f5"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Editorial typefaces: Cormorant Garamond (display serif, Copernicus substitute),
     Inter (humanist body sans), JetBrains Mono (code) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>

<!-- Warm-cream editorial theme (light); keep a single fixed theme -->
<script>
  try { localStorage.setItem("theme", "light"); } catch (e) {}
  document.documentElement.removeAttribute("data-theme");
</script>

<!-- Claude.com-style editorial redesign (loads after main.css so it wins the cascade) -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/claude.css"/>
<script defer src="{{ base_path }}/assets/js/glow-scroll.js"></script>


<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- end custom head snippets -->
